# ======================Nacos配置==============================
spring:
  application:
    # 服务名
    name: order
  profiles:
    # 环境名
    active: study
  cloud:
    nacos:
      #注册中心
      discovery:
        server-addr: 127.0.0.1:8848
      # 配置中心
      config:
        # nacos地址
        server-addr: 127.0.0.1:8848
        # 文件后缀
        file-extension: yml
    # ======================Sentinel配置==============================
    sentinel:
      transport:
        port: 8719
        dashboard: localhost:8718
      web-context-unify: false # 关闭统一入口管理模式
      datasource:
        flow:
          nacos:
            server-addr: ${spring.cloud.nacos.config.server-addr}
            group-id: SENTINEL_GROUP
            data-id: ${spring.application.name}-flow.json
            data-type: json
            rule-type: flow
        degrade:
          nacos:
            server-addr: ${spring.cloud.nacos.config.server-addr}
            group-id: SENTINEL_GROUP
            data-id: ${spring.application.name}-degrade.json
            data-type: json
            rule-type: degrade


# ======================OpenFeign配置==============================
feign:
  client:
    config:
      default:
        read-timeout: 2000
      stock: # 服务名
        read-timeout: 1000
  httpclient:
    hc5:
      enabled: true
    enabled: false
  okhttp:
    enabled: false
  circuitbreaker:
    enabled: true
