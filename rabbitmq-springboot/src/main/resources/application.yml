spring:
  rabbitmq:
    host: 192.168.113.3
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual # 开启手动ack
        prefetch: 10 # 流控
    publisher-confirm-type: correlated # 开启confirms的异步回调
    publisher-returns: true # 开启return回调  确认消息是否路由到了Queue
