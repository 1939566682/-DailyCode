# SpringBoot 核心配置
spring:
  # 应用名称
  application:
    name: SpringBootMyBatisDemo01
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource  #底层使用druid连接池
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/springboot?characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    druid:
      # 连接池的配置信息
      initial-size: 5  # 初始化连接数大小
      max-active: 30  # 最大连接数
      min-idle: 5   # 最小连接数

      # 配置获取连接等待超时的时间
      max-wait: 60000  #如果连接都被占用，最大等待时间1min=60000ms
      validation-query: SELECT 1 FROM DUAL  #通过从续表查询来监控是否连接数据库，语句执行能连接，语句不执行没连接
      # 配置一个连接在池中最小空闲的时间，单位是毫秒
      min-evictable-idle-time-millis: 300000
      test-while-idle: true
      # 开启SQL监控、防火墙监控、日志监控
      filters: stat,wall,slf4j
      # 配置DruidStatViewServlet
      stat-view-servlet:
        # 登录名
        login-username: admin
        # 登录密码
        login-password: admin
        url-pattern: /druid/*
        # IP白名单(没有配置或者为空，则允许所有访问)
        allow: 192.167.10.1,127.0.0.1  # 本机和设置的ip可以访问后台管理界面
        reset-enable: false # 不要重置
        # 启用控制台-后台管理界面，必须启用，否则访问界面会404
        enabled: true
#  freemarker:
#    suffix: .ftl # 修改后缀
#    content-type: text/html   # 此为默认类型，不设置也没有关系
#    charset: UTF-8
#    template-loader-path: classpath:/views/ # 修改存放目录,不修改默认就是templates下

# MyBatis 基础配置（SpringBoot集成MyBatis必备）
mybatis:
  # mapper.xml 文件路径
  mapper-locations: classpath:mapper/*.xml
  # 实体类别名包
  type-aliases-package: org.example.pojo
  # 开启下划线转驼峰
  configuration:
    map-underscore-to-camel-case: true
    # 打印SQL日志
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    org.example.mapper: trace

# 服务器端口（默认8080）
server:
  port: 8080