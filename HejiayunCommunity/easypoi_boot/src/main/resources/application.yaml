# 服务端口
server:
  port: 8080

# 应用名称
spring:
  application:
    name: easypoi

  #  Thymeleaf 模板关闭缓存
  thymeleaf:
    cache: false

  # 数据库配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/easypoi?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
    username: root
    password: root

# MyBatis 配置
mybatis:
  mapper-locations: classpath:com/exampel/easypoi_boot/mapper/*.xml
  type-aliases-package: com.exampel.easypoi_boot.entity