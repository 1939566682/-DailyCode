spring:
  # MySQL 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/springboot?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA/Hibernate 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # Thymeleaf 模板配置
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

  # Redis 配置
  data:
    redis:
      host: 127.0.0.1
      port: 7001
      password: 12346
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1

# 缓存配置（全局过期时间，可选）
spring.cache.redis.time-to-live: 60000   # 60秒

# MyBatis 配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.entity
  configuration:
    map-underscore-to-camel-case: true    # 开启驼峰映射
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 打印 SQL

logging:
  level:
    org.springframework.cache: DEBUG